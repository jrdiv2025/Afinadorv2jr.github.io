<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afinador de Violão</title>
  <link rel="manifest" href="/Afinadorv2jr.github.io/manifest.json">
  <meta name="theme-color" content="#0a0a14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #141418;
      --panel: #1a1a20;
      --text: #e8e8f0;
      --dim: #55556a;
      --green: #00e5a0;
      --red: #ff4060;
      --amber: #ffb800;
      --blue: #3d8eff;
      --border: #2a2a38;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(61,142,255,0.06) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border-radius: 24px;
      padding: 22px 20px 24px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03) inset;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(61,142,255,0.4), transparent);
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      background: rgba(61,142,255,0.1);
      border: 1px solid rgba(61,142,255,0.25);
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--blue);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ====== BOTÃO INICIAR ====== */
    #startBtn {
      background: linear-gradient(135deg, #1a2a4a 0%, #0d1a2e 100%);
      color: var(--blue);
      border: 1px solid rgba(61,142,255,0.4);
      padding: 10px 28px;
      border-radius: 30px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(61,142,255,0.1);
    }
    #startBtn:hover { box-shadow: 0 0 28px rgba(61,142,255,0.3); border-color: var(--blue); }
    #startBtn:active { transform: scale(0.97); }
    #startBtn.listening {
      background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 100%);
      color: var(--green); border-color: rgba(0,229,160,0.4);
      box-shadow: 0 0 20px rgba(0,229,160,0.1);
    }
    #startBtn.stopped {
      background: linear-gradient(135deg, #2a1a1a 0%, #1a0d0d 100%);
      color: var(--red); border-color: rgba(255,64,96,0.4);
    }

    #status {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      min-height: 1.2em;
      margin: 8px 0 16px;
      color: var(--blue);
      font-family: 'Share Tech Mono', monospace;
    }
    #status.ok { color: var(--green); }
    #status.err { color: var(--red); }

    /* ====== NOTA GRANDE ====== */
    .display { margin-bottom: 16px; }

    .note {
      font-size: 4rem;
      font-weight: 700;
      color: var(--dim);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: color 0.15s, text-shadow 0.15s;
    }
    .note.active { color: var(--text); text-shadow: 0 0 20px rgba(232,232,240,0.2); }
    .note.in-tune { color: var(--green); text-shadow: 0 0 30px rgba(0,229,160,0.5); }

    .cents {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      color: var(--dim);
      margin: 6px 0 2px;
      letter-spacing: 0.05em;
    }
    .info { font-size: 0.7rem; color: var(--dim); min-height: 1.1em; letter-spacing: 0.05em; }

    /* ====== GAUGE ANALÓGICO ====== */
    .gauge-wrapper {
      position: relative;
      width: 100%;
      margin: 18px 0 6px;
    }

    #gaugeCanvas {
      display: block;
      margin: 0 auto;
      width: 100%;
      max-width: 360px;
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      padding: 0 12px;
      margin-top: 4px;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .gauge-labels .flat { color: var(--red); }
    .gauge-labels .center { color: var(--green); }
    .gauge-labels .sharp { color: var(--red); }

    /* ====== VOLUME WRAPPER ====== */
    .bottom-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 2px;
    }

    .bottom-row .left { flex: 1; }

    .volume-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 32px;
      padding-top: 4px;
    }

    .volume-label {
      font-size: 0.58rem;
      color: var(--dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slider-track {
      width: 5px;
      height: 90px;
      background: #1a1a22;
      border-radius: 3px;
      position: relative;
      border: 1px solid var(--border);
    }

    .slider-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--blue), #6ab0ff);
      border-radius: 3px;
      transition: height 0.1s;
    }

    .slider-input {
      position: absolute;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
    }

    /* ====== REFERÊNCIAS ====== */
    .refs {
      border-top: 1px solid var(--border);
      padding-top: 18px;
      margin-top: 18px;
    }

    .refs-title {
      font-size: 0.72rem;
      color: var(--dim);
      margin-bottom: 10px;
      display: block;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }

    .ref-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 10px 0;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .ref-btn:hover { background: #222230; border-color: #3a3a50; color: var(--text); }
    .ref-btn.playing {
      background: rgba(61,142,255,0.15);
      border-color: var(--blue);
      color: var(--blue);
      box-shadow: 0 0 12px rgba(61,142,255,0.2);
    }

    .hint {
      margin-top: 16px;
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎸 Afinador de Violão</h1>
    <div class="badge">Violão • Auto-detect</div>

    <button id="startBtn">INICIAR</button>
    <div id="status">Aguardando...</div>

    <div class="bottom-row">
      <div class="left">
        <div class="display">
          <div class="note" id="note">--</div>
          <div class="cents" id="cents">0 cents</div>
          <div class="info" id="info">Toque uma corda...</div>
        </div>

        <!-- GAUGE ANALÓGICO -->
        <div class="gauge-wrapper">
          <canvas id="gaugeCanvas" height="160"></canvas>
          <div class="gauge-labels">
            <span class="flat">♭ Bemol</span>
            <span class="center">◆ Afinado</span>
            <span class="sharp">Sustenido ♯</span>
          </div>
        </div>
      </div>

      <div class="volume-control">
        <span class="volume-label">Vol</span>
        <div class="slider-track">
          <div class="slider-fill" id="sliderFill" style="height: 70%;"></div>
          <input type="range" id="volumeSlider" class="slider-input"
                 min="0" max="100" value="70" orient="vertical">
        </div>
      </div>
    </div>

    <div class="refs">
      <span class="refs-title">Tons de referência</span>
      <div class="grid">
        <button class="ref-btn" data-note="E2">E2</button>
        <button class="ref-btn" data-note="A2">A2</button>
        <button class="ref-btn" data-note="D3">D3</button>
        <button class="ref-btn" data-note="G3">G3</button>
        <button class="ref-btn" data-note="B3">B3</button>
        <button class="ref-btn" data-note="E4">E4</button>
      </div>
    </div>

    <div class="hint">Toque forte e limpo • Aproxime o violão do microfone</div>
  </div>

  <script>
    // ===== GLOBALS =====
    let audioContext = null, analyser = null, microphone = null, gainNode = null;
    let isListening = false, animationId = null, currentAudio = null, currentBtn = null;
    let micVolume = 0.7;

    // ===== DOM =====
    const startBtn    = document.getElementById('startBtn');
    const noteEl      = document.getElementById('note');
    const centsEl     = document.getElementById('cents');
    const infoEl      = document.getElementById('info');
    const statusEl    = document.getElementById('status');
    const refBtns     = document.querySelectorAll('.ref-btn');
    const volumeSlider= document.getElementById('volumeSlider');
    const sliderFill  = document.getElementById('sliderFill');
    const canvas      = document.getElementById('gaugeCanvas');
    const ctx         = canvas.getContext('2d');

    const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

    // ===== FÍSICA DO PONTEIRO (mola amortecida) =====
    let needleAngle   = 0;   // ângulo atual (rad), 0 = centro
    let needleVelocity= 0;
    let targetAngle   = 0;
    const SPRING_K    = 16;  // rigidez
    const SPRING_DAMP = 5.5; // amortecimento
    const MAX_ANGLE   = Math.PI * 0.42; // ±76°

    // Estado do gauge
    let inTune       = false;
    let hasSignal    = false;
    let glowPhase    = 0;

    // ===== CANVAS SETUP =====
    function resizeCanvas() {
      const w = Math.min(canvas.parentElement.offsetWidth, 360);
      canvas.width  = w;
      canvas.height = Math.round(w * 0.44);
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); });

    // ===== RENDER GAUGE =====
    function drawGauge(timestamp) {
      const W = canvas.width, H = canvas.height;
      const cx = W / 2;
      const cy = H * 1.08;          // pivô bem abaixo para arco suave
      const R  = H * 1.85;          // raio do arco
      const rInner = R - H * 0.52;  // margem interna

      ctx.clearRect(0, 0, W, H);

      // --- Física de mola (Euler) ---
      const dt = 1 / 60;
      const force = -SPRING_K * needleAngle + SPRING_K * targetAngle;
      needleVelocity = (needleVelocity + force * dt) * (1 - SPRING_DAMP * dt);
      needleAngle   += needleVelocity * dt;
      needleAngle    = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, needleAngle));

      glowPhase += 0.05;

      // Ângulo de início/fim do arco (medido a partir de cima)
      const startA = -Math.PI/2 - MAX_ANGLE;
      const endA   = -Math.PI/2 + MAX_ANGLE;

      // === ARCO DE FUNDO (escuro) ===
      ctx.beginPath();
      ctx.arc(cx, cy, R, startA, endA);
      ctx.arc(cx, cy, rInner, endA, startA, true);
      ctx.closePath();
      ctx.fillStyle = '#111118';
      ctx.fill();
      ctx.strokeStyle = '#1e1e28';
      ctx.lineWidth = 1;
      ctx.stroke();

      // === ZONAS DE COR ===
      // Zona vermelha esquerda (♭)
      drawZoneArc(ctx, cx, cy, R, rInner, startA, startA + MAX_ANGLE * 0.55,
        'rgba(255,64,96,0.22)', 'rgba(255,64,96,0.08)');
      // Zona verde central
      const greenHalf = MAX_ANGLE * 0.16;
      drawZoneArc(ctx, cx, cy, R, rInner,
        -Math.PI/2 - greenHalf, -Math.PI/2 + greenHalf,
        'rgba(0,229,160,0.25)', 'rgba(0,229,160,0.06)');
      // Zona vermelha direita (♯)
      drawZoneArc(ctx, cx, cy, R, rInner,
        endA - MAX_ANGLE * 0.55, endA,
        'rgba(255,64,96,0.08)', 'rgba(255,64,96,0.22)');

      // === MARCAÇÕES DE ESCALA ===
      const tickCount = 21; // traços totais (incluindo extremos)
      for (let i = 0; i < tickCount; i++) {
        const t = i / (tickCount - 1);
        const a = startA + (endA - startA) * t;
        const centerDist = Math.abs(t - 0.5);
        const major = (i % 5 === 0);
        const mid   = (i % 5 === 2 || i % 5 === 3) && !major;

        const tickLen = major ? H * 0.19 : (mid ? H * 0.10 : H * 0.07);
        const tickW   = major ? 1.8 : 1;

        const r1 = R - 2;
        const r2 = R - tickLen;

        const cos = Math.cos(a), sin = Math.sin(a);

        // Cor da marcação
        let color;
        if (centerDist < 0.08) color = '#00e5a0';
        else if (centerDist > 0.36) color = '#ff4060';
        else color = '#44445a';

        ctx.beginPath();
        ctx.moveTo(cx + r1*cos, cy + r1*sin);
        ctx.lineTo(cx + r2*cos, cy + r2*sin);
        ctx.strokeStyle = color;
        ctx.lineWidth = tickW;
        ctx.stroke();

        // Números nas principais
        if (major) {
          const labels = ['-50','-25','0','+25','+50'];
          const li = i / 5;
          if (li >= 0 && li <= 4) {
            const numR = R - tickLen - H * 0.12;
            const nx = cx + numR * cos;
            const ny = cy + numR * sin;
            ctx.save();
            ctx.translate(nx, ny);
            ctx.rotate(a + Math.PI / 2);
            ctx.font = `${Math.round(H * 0.11)}px 'Share Tech Mono', monospace`;
            ctx.fillStyle = centerDist < 0.08 ? '#00e5a0' : centerDist > 0.36 ? '#ff4060' : '#3a3a52';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(labels[li], 0, 0);
            ctx.restore();
          }
        }
      }

      // === REBITE CENTRAL ===
      const boltR = H * 0.07;
      ctx.beginPath();
      ctx.arc(cx, cy, boltR * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a22';
      ctx.fill();
      ctx.strokeStyle = '#2a2a38';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // === PONTEIRO ===
      const needA = -Math.PI/2 + needleAngle;
      const pLen  = R - H * 0.07;
      const pBack = H * 0.06;

      // Sombra do ponteiro
      ctx.save();
      ctx.shadowColor = inTune ? 'rgba(0,229,160,0.6)' : 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = inTune ? 18 : 8;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;

      // Ponteiro principal (forma trapezoidal afunilada)
      const baseW = H * 0.025;
      const tipW  = H * 0.006;
      const perpA = needA + Math.PI / 2;
      const cosP = Math.cos(perpA), sinP = Math.sin(perpA);
      const cosN = Math.cos(needA),  sinN = Math.sin(needA);

      const px1 = cx - cosN*pBack + cosP*baseW, py1 = cy - sinN*pBack + sinP*baseW;
      const px2 = cx - cosN*pBack - cosP*baseW, py2 = cy - sinN*pBack - sinP*baseW;
      const px3 = cx + cosN*pLen  + cosP*tipW,  py3 = cy + sinN*pLen  + sinP*tipW;
      const px4 = cx + cosN*pLen  - cosP*tipW,  py4 = cy + sinN*pLen  - sinP*tipW;

      ctx.beginPath();
      ctx.moveTo(px1, py1);
      ctx.lineTo(px3, py3);
      ctx.lineTo(px4, py4);
      ctx.lineTo(px2, py2);
      ctx.closePath();

      // Gradiente no ponteiro
      const grd = ctx.createLinearGradient(
        cx - cosN*pBack, cy - sinN*pBack,
        cx + cosN*pLen,  cy + sinN*pLen
      );
      if (inTune) {
        grd.addColorStop(0, '#00e5a0');
        grd.addColorStop(1, '#00ffb3');
      } else if (hasSignal) {
        grd.addColorStop(0, '#5577cc');
        grd.addColorStop(1, '#88aaff');
      } else {
        grd.addColorStop(0, '#3a3a50');
        grd.addColorStop(1, '#55556a');
      }
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();

      // === REBITE CENTRAL (sobre o ponteiro) ===
      ctx.beginPath();
      ctx.arc(cx, cy, boltR, 0, Math.PI * 2);
      const boltGrd = ctx.createRadialGradient(cx-1, cy-1, 0, cx, cy, boltR);
      boltGrd.addColorStop(0, '#3a3a50');
      boltGrd.addColorStop(1, '#111118');
      ctx.fillStyle = boltGrd;
      ctx.fill();
      ctx.strokeStyle = inTune ? '#00e5a0' : '#2a2a3a';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Brilho no rebite
      ctx.beginPath();
      ctx.arc(cx - boltR*0.3, cy - boltR*0.3, boltR*0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fill();

      // === GLOW VERDE QUANDO AFINADO ===
      if (inTune) {
        const glow = 0.4 + 0.3 * Math.sin(glowPhase);
        const gl = ctx.createRadialGradient(cx, cy - H*0.3, 0, cx, cy - H*0.3, H*0.6);
        gl.addColorStop(0, `rgba(0,229,160,${glow * 0.25})`);
        gl.addColorStop(1, 'rgba(0,229,160,0)');
        ctx.beginPath();
        ctx.arc(cx + pLen*0.6*cosN, cy + pLen*0.6*sinN, H*0.4, 0, Math.PI*2);
        ctx.fillStyle = gl;
        ctx.fill();
      }

      requestAnimationFrame(drawGauge);
    }

    // Helper: desenha setor do arco com gradiente
    function drawZoneArc(ctx, cx, cy, rOut, rIn, a1, a2, c1, c2) {
      ctx.beginPath();
      ctx.arc(cx, cy, rOut, a1, a2);
      ctx.arc(cx, cy, rIn, a2, a1, true);
      ctx.closePath();
      const grd = ctx.createLinearGradient(
        cx + rIn*Math.cos(a1), cy + rIn*Math.sin(a1),
        cx + rIn*Math.cos(a2), cy + rIn*Math.sin(a2)
      );
      grd.addColorStop(0, c1);
      grd.addColorStop(1, c2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Inicia o loop de renderização
    requestAnimationFrame(drawGauge);

    // ===== VOLUME =====
    volumeSlider.addEventListener('input', (e) => {
      micVolume = e.target.value / 100;
      sliderFill.style.height = e.target.value + '%';
      if (gainNode) gainNode.gain.value = micVolume;
    });

    // ===== INICIAR / PARAR =====
    startBtn.addEventListener('click', async () => {
      if (isListening) {
        isListening = false;
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        startBtn.textContent = 'INICIAR';
        startBtn.classList.remove('listening');
        startBtn.classList.add('stopped');
        statusEl.textContent = 'Parado';
        statusEl.className = '';
        infoEl.textContent = 'Clique em INICIAR para capturar';
        targetAngle = 0; hasSignal = false; inTune = false;
        return;
      }

      try {
        statusEl.textContent = 'Pedindo permissão...';
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        microphone = audioContext.createMediaStreamSource(stream);
        gainNode   = audioContext.createGain();
        gainNode.gain.value = micVolume;
        analyser   = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        microphone.connect(gainNode);
        gainNode.connect(analyser);

        isListening = true;
        startBtn.textContent = '■ PARAR';
        startBtn.classList.add('listening');
        startBtn.classList.remove('stopped');
        statusEl.textContent = 'Capturando...';
        statusEl.className = 'ok';
        detectPitch();
      } catch (err) {
        statusEl.textContent = 'Erro: ' + err.message;
        statusEl.className = 'err';
        alert('Permita o microfone para usar o afinador.');
      }
    });

    // ===== AUTO-CORRELAÇÃO =====
    function autoCorrelate(buffer, sampleRate) {
      const SIZE = buffer.length;
      let rms = 0;
      for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.01) return -1;

      let start = 0;
      for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buffer[i]) > 0.2) { start = i; break; } }
      let end = SIZE - 1;
      for (let i = SIZE - 1; i > SIZE / 2; i--) { if (Math.abs(buffer[i]) > 0.2) { end = i; break; } }

      const signal = buffer.slice(start, end + 1);
      const signalSize = signal.length;
      if (signalSize < 10) return -1;

      const correlations = [];
      for (let lag = 0; lag < signalSize; lag++) {
        let sum = 0;
        for (let i = 0; i < signalSize - lag; i++) sum += signal[i] * signal[i + lag];
        correlations[lag] = sum;
      }

      let bestLag = -1, bestCorr = -Infinity;
      const minLag = Math.floor(sampleRate / 1000);
      const maxLag = Math.floor(sampleRate / 40);

      for (let lag = minLag; lag < Math.min(maxLag, signalSize); lag++) {
        if (lag > 0 && lag < signalSize - 1 &&
            correlations[lag] > correlations[lag-1] &&
            correlations[lag] > correlations[lag+1] &&
            correlations[lag] > bestCorr) {
          bestCorr = correlations[lag];
          bestLag  = lag;
        }
      }

      return bestLag <= 0 ? -1 : sampleRate / bestLag;
    }

    function getNote(frequency) {
      if (!frequency || frequency < 60 || frequency > 500) return null;
      const noteNum   = Math.round(12 * Math.log2(frequency / 440) + 69);
      const noteName  = NOTES[noteNum % 12];
      const octave    = Math.floor(noteNum / 12) - 1;
      const targetFreq= 440 * Math.pow(2, (noteNum - 69) / 12);
      const cents     = Math.round(1200 * Math.log2(frequency / targetFreq));
      return { note: noteName + octave, cents, targetFreq };
    }

    function detectPitch() {
      if (!isListening || !analyser) return;
      const buffer = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(buffer);
      const frequency = autoCorrelate(buffer, audioContext.sampleRate);

      if (frequency > 0) {
        const result = getNote(frequency);
        if (result) {
          noteEl.textContent = result.note;
          noteEl.classList.add('active');
          centsEl.textContent = (result.cents >= 0 ? '+' : '') + result.cents + ' cents';
          infoEl.textContent  = frequency.toFixed(1) + ' Hz → ' + result.targetFreq.toFixed(1) + ' Hz';
          hasSignal = true;

          // Mover ponteiro: mapear cents [-50..+50] → [-MAX_ANGLE..+MAX_ANGLE]
          const clamped = Math.max(-50, Math.min(50, result.cents));
          targetAngle = (clamped / 50) * MAX_ANGLE;

          inTune = Math.abs(result.cents) <= 5;
          if (inTune) {
            noteEl.classList.add('in-tune');
            statusEl.textContent = '✓ Afinado!';
            statusEl.className = 'ok';
          } else {
            noteEl.classList.remove('in-tune');
            statusEl.textContent = 'Ajuste...';
            statusEl.className = '';
          }
        }
      } else {
        hasSignal = false;
        inTune = false;
      }

      animationId = requestAnimationFrame(detectPitch);
    }

    // ===== TONS DE REFERÊNCIA =====
    function playStopTone(note, btn) {
      if (currentBtn === btn && currentAudio && !currentAudio.paused) {
        currentAudio.pause(); currentAudio.currentTime = 0;
        btn.classList.remove('playing'); currentBtn = null; currentAudio = null;
        statusEl.textContent = isListening ? 'Capturando...' : 'Parado';
        statusEl.className = isListening ? 'ok' : '';
        return;
      }
      if (currentAudio) {
        currentAudio.pause(); currentAudio.currentTime = 0;
        if (currentBtn) currentBtn.classList.remove('playing');
      }

      const paths = [
        note+'.wav',
        note.toLowerCase()+'.wav',
        './'+note+'.wav',
        './'+note.toLowerCase()+'.wav'
      ];

      currentAudio = new Audio(); currentBtn = btn;
      let pathIndex = 0;

      function tryNextPath() {
        if (pathIndex >= paths.length) {
          statusEl.textContent = 'WAV não encontrado'; statusEl.className = 'err';
          btn.classList.remove('playing'); currentBtn = null; currentAudio = null; return;
        }
        currentAudio.src = paths[pathIndex];
        currentAudio.play().then(() => {
          btn.classList.add('playing');
          statusEl.textContent = '🔊 ' + note; statusEl.className = '';
        }).catch(() => { pathIndex++; tryNextPath(); });
      }
      tryNextPath();

      currentAudio.onended = () => {
        btn.classList.remove('playing'); currentBtn = null; currentAudio = null;
        statusEl.textContent = isListening ? 'Capturando...' : 'Parado';
        statusEl.className = isListening ? 'ok' : '';
      };
    }

    refBtns.forEach(btn => btn.addEventListener('click', () => playStopTone(btn.dataset.note, btn)));

    console.log('🎸 Afinador carregado');
  </script>
